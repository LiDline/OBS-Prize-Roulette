<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OBS Roulette Overlay</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main id="rouletteOverlay" class="roulette-overlay" aria-live="polite">
      <section class="roulette-stage">
        <div id="rouletteTitle" class="roulette-title">Рулетка призов</div>
        <div class="pointer" aria-hidden="true"></div>

        <div class="reel-window">
          <div id="reelTrack" class="reel-track"></div>
        </div>

        <div id="resultPanel" class="result-panel">
          <span class="result-label">Выпал приз</span>
          <strong id="resultName">-</strong>
        </div>
      </section>
    </main>

    <aside id="debugPanel" class="debug-panel" aria-label="Debug panel">
      <label class="donation-row">
        <span>Сумма</span>
        <input id="donationAmount" type="number" min="0" step="1" value="500">
      </label>
      <button id="simulateDonationButton" type="button">Симулировать донат</button>
      <pre id="oddsOutput" class="odds-output"></pre>
    </aside>
    <script src="js/uploaded-images.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/roulette.js"></script>
    <script src="js/donation-alerts.js"></script>
    <script src="js/debug.js"></script>
    <script src="script.js"></script>
  </body>
</html>
